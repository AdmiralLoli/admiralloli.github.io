<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitemiral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0d0f;
    --card-bg: #161418;
    --text: #f0eaee;
    --muted: #7a6e74;
    --border: rgba(255,255,255,0.07);
    --hover-border: #d4537e;
    --pink: #d4537e;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: fixed;
    top: 0; left: 0;
    padding: 1.5rem 2rem;
    z-index: 100;
  }

  .site-title {
    font-family: 'DM Mono', monospace;
    font-size: 25px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    text-decoration: none;
  }

  /* ── Main grid ── */
  main {
    padding: 6rem 2rem 3rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 330px);
    gap: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: 330px;
    overflow: hidden;
    text-decoration: none;
    display: block;
    transition: border-color 0.2s ease, transform 0.2s ease;
    animation: fadeUp 0.5s ease both;
  }

  .card:hover {
    border-color: var(--pink);
    transform: translateY(-4px);
    box-shadow: 0 0 0 1px var(--pink);
  }

  /* stagger */
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.10s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.20s; }
  .card:nth-child(5) { animation-delay: 0.25s; }
  .card:nth-child(6) { animation-delay: 0.30s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── iframe wrapper ── */
  .preview-wrap {
    width: 330px;
    height: 180px;
    position: relative;
    overflow: hidden;
    background: #0a090b;
  }

  /* Scale an 1100px-wide site down into the 280px card */
  .preview-wrap iframe {
    width: 1100px;
    height: 700px;
    border: none;
    pointer-events: none;   /* purely visual */
    transform: scale(0.3);
    transform-origin: top left;
    display: block;
  }

  /* Invisible overlay to block any accidental interaction */
  .preview-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
  }

  /* ── Card footer ── */
  .card-footer {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--border);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--pink);
    flex-shrink: 0;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>

<header>
  <!-- ✏️ Change this to your domain -->
  <a href="/" class="site-title">Sitemiral</a>
</header>

<main>
  <div class="grid">

    <!-- ✏️ Each card: set href to your subdomain URL, and update the label -->
    <!-- The iframe src can be the same URL — it's just a visual snapshot -->

    <a class="card" href="https://chess.miral.dev" target="_blank">
      <div class="preview-wrap">
        <iframe src="https://chess.miral.dev" loading="lazy" title="blog preview" tabindex="-1"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-label">4x4 Chess</span>
      </div>
    </a>

    <a class="card" href="https://sayhi.miral.dev" target="_blank">
      <div class="preview-wrap">
        <iframe src="https://sayhi.miral.dev" loading="lazy" title="shop preview" tabindex="-1"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-label">anonymous message board</span>
      </div>
    </a>
	
	<a class="card" href="https://vault.miral.dev" target="_blank">
      <div class="preview-wrap">
        <iframe src="https://vault.miral.dev" loading="lazy" title="shop preview" tabindex="-1"></iframe>
      </div>
      <div class="card-footer">
        <span class="card-label">Vault-7 "Dungeon" Crawler </span>
      </div>
    </a>

  </div>
</main>

</body>
</html>
